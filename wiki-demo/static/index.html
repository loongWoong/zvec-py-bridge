// 处理文件选择（多文件）
function handleFileSelect(event) {
  const files = event.target.files;
  if (!files || !files.length) return;
  const validExts = ['.md', '.txt', '.markdown'];
  const newFiles = [];
  for (const f of files) {
    const ext = '.' + (f.name.split('.').pop() || '').toLowerCase();
    if (validExts.includes(ext) || f.type === 'text/plain' || f.type === 'text/markdown') {
      newFiles.push({file: f, name: f.name, size: f.size, content: null, status: 'pending'});
    }
  }
  if (newFiles.length === 0) {
    alert('未找到支持的文件（.md / .txt）');
    return;
  }
  selectedFiles.push(...newFiles);
  renderFileList();
  event.target.value = ''; // 允许重复选择同一文件
}

// 处理文件夹选择（webkitdirectory）
function handleFolderSelect(event) {
  const files = event.target.files;
  if (!files || !files.length) return;
  const validExts = ['.md', '.txt', '.markdown'];
  const newFiles = [];
  for (const f of files) {
    const ext = '.' + (f.name.split('.').pop() || '').toLowerCase();
    if (validExts.includes(ext) || f.type === 'text/plain' || f.type === 'text/markdown') {
      // webkitRelativePath 包含文件夹路径
      const relPath = f.webkitRelativePath || f.name;
      newFiles.push({file: f, name: relPath, size: f.size, content: null, status: 'pending'});
    }
  }
  if (newFiles.length === 0) {
    alert('文件夹中未找到支持的文件（.md / .txt）');
    return;
  }
  selectedFiles.push(...newFiles);
  renderFileList();
  event.target.value = '';
}

// 渲染文件列表
function renderFileList() {
  const container = document.getElementById('file-list-container');
  const listEl = document.getElementById('file-list');
  const countEl = document.getElementById('file-count');
  const batchBtn = document.getElementById('batch-compile-btn');

  if (!selectedFiles.length) {
    container.style.display = 'none';
    batchBtn.style.display = 'none';
    return;
  }
  container.style.display = 'block';
  batchBtn.style.display = 'inline-block';
  countEl.textContent = selectedFiles.length;

  listEl.innerHTML = selectedFiles.map((f, i) => {
    const sizeStr = f.size < 1024 ? f.size + 'B' : (f.size < 1048576 ? (f.size/1024).toFixed(1)+'KB' : (f.size/1048576).toFixed(1)+'MB');
    const statusHtml = f.status === 'ok' ? '<span class="file-status ok">✓</span>'
      : f.status === 'error' ? '<span class="file-status error">✗</span>'
      : f.status === 'compiling' ? '<span class="file-status pending">⟳</span>'
      : f.status === 'skipped' ? '<span class="file-status skipped">⊘ 已入库</span>'
      : '';
    return `<div class="file-item" id="file-item-${i}">
      <span class="file-name">${esc(f.name)}</span>
      <span class="file-size">${sizeStr}</span>
      ${statusHtml}
      <span class="file-remove" onclick="removeFile(${i})">✕</span>
    </div>`;
  }).join('');
}

// 删除单个文件
function removeFile(index) {
  selectedFiles.splice(index, 1);
  renderFileList();
}

// 清空文件列表
function clearFileList() {
  selectedFiles = [];
  renderFileList();
}

// 批量编译：逐个文件上传到 /api/compile-batch（含重复检测）
async function compileBatch() {
  if (!selectedFiles.length) return;

  const topic = document.getElementById('compile-topic').value.trim() || null;
  const progressEl = document.getElementById('batch-progress');
  const fillEl = document.getElementById('progress-fill');
  const textEl = document.getElementById('progress-text');
  const batchBtn = document.getElementById('batch-compile-btn');
  const resultEl = document.getElementById('compile-result');

  // ── 重复检测 ──
  const titles = selectedFiles.map(f => {
    const pureName = f.name.split('/').pop();
    return pureName.replace(/\.[^.]+$/, ''); // 去掉扩展名 = title_hint
  });
  let duplicates = [];
  try {
    const dr = await fetch(API + '/api/documents/check-duplicates', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(titles),
    });
    if (dr.ok) {
      const dd = await dr.json();
      duplicates = dd.duplicates || [];
    }
  } catch (e) { /* 检查失败不影响主流程 */ }

  // 标记重复文件并询问用户
  if (duplicates.length > 0) {
    const dupNames = duplicates.map(d => `• ${d.title} → 已有文档「${d.existing_title}」`).join('\n');
    const choice = confirm(
      `检测到 ${duplicates.length} 个重复文件：\n\n${dupNames}\n\n点"确定"跳过重复继续编译其余文件\n点"取消"放弃本次编译`
    );
    if (!choice) {
      resultEl.innerHTML = '<div style="color:var(--text-secondary)">已取消编译</div>';
      return;
    }
    // 标记重复文件为跳过
    const dupTitleSet = new Set(duplicates.map(d => d.title));
    selectedFiles.forEach(f => {
      const pureName = f.name.split('/').pop();
      const hint = pureName.replace(/\.[^.]+$/, '');
      if (dupTitleSet.has(hint)) {
        f.status = 'skipped';
        f.reason = '文件已编译入库';
      }
    });
    renderFileList();
  }

  progressEl.style.display = 'block';
  batchBtn.disabled = true;
  resultEl.innerHTML = '';

  const total = selectedFiles.filter(f => f.status !== 'skipped').length;
  let succeeded = 0;
  let done = 0;

  for (let i = 0; i < selectedFiles.length; i++) {
    const f = selectedFiles[i];
    if (f.status === 'skipped') continue;

    f.status = 'compiling';
    renderFileList();
    done++;

    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    fillEl.style.width = pct + '%';
    textEl.textContent = `编译中 ${done}/${total}: ${f.name}`;

    try {
      const formData = new FormData();
      formData.append('files', f.file, f.name.split('/').pop());
      if (topic) formData.append('topic', topic);

      const r = await fetch(API + '/api/compile-batch', {
        method: 'POST',
        body: formData,
      });
      if (!r.ok) {
        const e = await r.json();
        f.status = 'error';
        f.reason = e.detail || '编译失败';
      } else {
        const d = await r.json();
        const item = d.results && d.results[0];
        if (item && item.status === 'ok') {
          f.status = 'ok';
          f.title = item.title;
          succeeded++;
        } else {
          f.status = 'error';
          f.reason = item ? item.reason : '未知错误';
        }
      }
    } catch (e) {
      f.status = 'error';
      f.reason = String(e);
    }
    renderFileList();
  }

  // 完成
  fillEl.style.width = '100%';
  const skipped = selectedFiles.filter(f => f.status === 'skipped').length;
  const failed = selectedFiles.filter(f => f.status === 'error').length;
  textEl.textContent = `完成: ${succeeded} 成功` + (skipped > 0 ? `, ${skipped} 跳过` : '') + (failed > 0 ? `, ${failed} 失败` : '');
  batchBtn.disabled = false;

  let summaryHtml = `<div style="color:var(--green-fg)">✓ 成功编译 ${succeeded} 篇文档</div>`;
  if (skipped > 0) {
    summaryHtml += `<div style="color:var(--yellow-fg)">⊘ 跳过 ${skipped} 个重复文件（已入库）</div>`;
  }
  if (failed > 0) {
    summaryHtml += `<div style="color:var(--red-fg)">⚠ ${failed} 篇失败</div>`;
    const errors = selectedFiles.filter(f => f.status === 'error' || f.status === 'skipped');
    if (errors.length) {
      summaryHtml += '<div style="margin-top:8px;font-size:12px;color:var(--text-secondary);font-family:var(--font-mono);">'
        + errors.map(f => `${esc(f.name)}: ${esc(f.reason || f.status)}`).join('<br>') + '</div>';
    }
  }
  resultEl.innerHTML = summaryHtml;

  if (succeeded > 0) {
    setTimeout(() => { toggleCompile(); loadDocs(); }, 2500);
  }
}

async function doCompile() {
  const content = document.getElementById('compile-content').value.trim();
  if (!content) { alert('请输入原始资料'); return; }
  const topic = document.getElementById('compile-topic').value.trim() || null;
  const el = document.getElementById('compile-result');
  el.innerHTML = '<div class="loading">LLM 编译中</div>';
  try {
    const r = await fetch(API + '/api/compile', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({raw_content: content, topic: topic, title_hint: null}),
    });
    if (!r.ok) { const e = await r.json(); el.innerHTML = `<div style="color:var(--red-fg)">⚠ ${esc(e.detail || '编译失败')}</div>`; return; }
    const d = await r.json();
    el.innerHTML = `<div style="color:var(--green-fg)">✓ 编译成功：${esc(d.document.title)}</div>`;
    setTimeout(() => { toggleCompile(); loadDocs(); }, 1500);
  } catch (e) { el.innerHTML = `<div style="color:var(--red-fg)">⚠ ${esc(String(e))}</div>`; }
}

// ── Graph query panel ──
function toggleGraphQuery() {
  const el = document.getElementById('graph-query-panel');
  const btn = document.getElementById('gq-toggle-btn');
  const isHidden = el.style.display === 'none';
  el.style.display = isHidden ? 'block' : 'none';
  btn.textContent = isHidden ? '图查询 ▾' : '图查询 ▸';
  if (isHidden) {
    // 展开图查询面板时立即以力导向重绘全图：退出子图模式 + 清除 focusNode。
    // 面板 display:block 后浏览器尚未完成布局，svgEl.clientWidth 可能仍是旧值，
    // 用 requestAnimationFrame 等一帧再 buildGraph，确保拿到正确的容器尺寸。
    // 不重复调用 renderGraph（会异步 fetch 并二次 buildGraph），避免两次 fitView 过渡冲突。
    subgraphOverride = null;
    const resetBtn = document.getElementById('graph-reset-btn');
    if (resetBtn) resetBtn.style.display = 'none';
    useForceLayout();
    requestAnimationFrame(() => buildGraph());
  }
}

// 节点 ID → 友好标签
function nodeLabel(id) {
  const n = graphData.nodes.find(x => x.id === id);
  return n ? n.label : id.split(':').pop();
}

// 节点类型 → badge class
function typeBadgeClass(type) {
  return ({document:'doc', entity:'entity', tag:'tag', topic:'topic', raw:'raw', archive:'archive'})[type] || 'raw';
}

// ── 可搜索下拉框 ──
const ssState = {}; // targetId -> {value, filteredNodes}

function initSearchableSelects() {
  document.querySelectorAll('.searchable-select').forEach(container => {
    const targetId = container.dataset.target;
    const typeFilter = container.dataset.filter; // 'document', 'entity', etc.
    if (!targetId || ssState[targetId]) return; // 已初始化

    let nodes = graphData.nodes;
    if (typeFilter) nodes = nodes.filter(n => n.type === typeFilter);

    ssState[targetId] = { value: '', nodes };

    container.innerHTML = `
      <input type="text" class="ss-input" id="${targetId}-input" placeholder="搜索或选择节点…" autocomplete="off">
      <div class="ss-dropdown" id="${targetId}-dropdown"></div>
    `;

    const input = document.getElementById(`${targetId}-input`);
    const dropdown = document.getElementById(`${targetId}-dropdown`);
    let activeIdx = -1;

    function renderOptions(filter = '') {
      const filtered = filter
        ? nodes.filter(n => n.label.toLowerCase().includes(filter.toLowerCase()) || n.id.toLowerCase().includes(filter.toLowerCase()))
        : nodes;
      activeIdx = -1;
      if (!filtered.length) {
        dropdown.innerHTML = '<div class="ss-option" style="color:var(--text-tertiary)">无匹配节点</div>';
        return;
      }
      dropdown.innerHTML = filtered.slice(0, 50).map((n, i) =>
        `<div class="ss-option" data-id="${esc(n.id)}" data-idx="${i}">
          ${esc(n.label)}<span class="ss-type">[${n.type}]</span>
        </div>`
      ).join('');
      // 点击选项
      dropdown.querySelectorAll('.ss-option').forEach(opt => {
        opt.addEventListener('click', () => {
          const id = opt.dataset.id;
          if (!id) return;
          ssState[targetId].value = id;
          input.value = nodeLabel(id);
          dropdown.classList.remove('show');
        });
      });
    }

    input.addEventListener('focus', () => {
      renderOptions(input.value);
      dropdown.classList.add('show');
    });
    input.addEventListener('input', () => {
      ssState[targetId].value = ''; // 清空已选值
      renderOptions(input.value);
      dropdown.classList.add('show');
    });
    input.addEventListener('keydown', (e) => {
      const opts = dropdown.querySelectorAll('.ss-option');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, opts.length - 1);
        opts.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
        if (opts[activeIdx]) opts[activeIdx].scrollIntoView({block: 'nearest'});
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        opts.forEach((o, i) => o.classList.toggle('active', i === activeIdx));
        if (opts[activeIdx]) opts[activeIdx].scrollIntoView({block: 'nearest'});
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIdx >= 0 && opts[activeIdx] && opts[activeIdx].dataset.id) {
          const id = opts[activeIdx].dataset.id;
          ssState[targetId].value = id;
          input.value = nodeLabel(id);
          dropdown.classList.remove('show');
        }
      } else if (e.key === 'Escape') {
        dropdown.classList.remove('show');
      }
    });
    // 点击外部关闭
    document.addEventListener('click', (e) => {
      if (!container.contains(e.target)) dropdown.classList.remove('show');
    });
  });
}

// 获取可搜索下拉框的值
function getSSValue(targetId) {
  return ssState[targetId]?.value || '';
}

// ── 查询 Tab 切换 ──

// ── 结果渲染辅助 ──
function gqLoading() {
  document.getElementById('gq-result').innerHTML = '<div class="loading">查询中</div>';
}
function gqError(msg) {
  document.getElementById('gq-result').innerHTML = `<span style="color:var(--red-fg)">⚠ ${esc(msg)}</span>`;
}
function gqNodeChip(id) {
  const label = nodeLabel(id);
  const type = id.split(':')[0];
  return `<span class="gq-badge ${typeBadgeClass(type)}">${esc(label)}</span>`;
}
function gqEdgeChip(type) {
  return `<span class="gq-edge-badge">${esc(type)}</span>`;
}
function gqClickableNode(id) {
  const label = nodeLabel(id);
  const type = id.split(':')[0];
  return `<span class="gq-badge ${typeBadgeClass(type)} gq-clickable" onclick="gqNodeClick('${esc(id)}')">${esc(label)}</span>`;
}
function gqNodeClick(id) {
  // 在图查询结果中点击节点 → 跳转到对应视图
  graphNodeClick(id);
}

// ── 1. 最短路径 ──
async function runShortestPath() {
  const src = getSSValue('gq-path-src');
  const dst = getSSValue('gq-path-dst');
  if (!src || !dst) { alert('请选择源节点和目标节点'); return; }
  gqLoading();
  try {
    const r = await fetch(API + `/api/graph/${encodeURIComponent(src)}/shortest-path?target=${encodeURIComponent(dst)}`);
    const d = await r.json();
    const el = document.getElementById('gq-result');
    if (d.length === -1 || (d.path && !d.path.length)) {
      el.innerHTML = '<span style="color:var(--red-fg)">未找到路径</span>';
      resetGraph();
      return;
    }
    const pathHtml = d.path.map((p, i) => {
      const edge = d.edges?.[i];
      return gqClickableNode(p) + (edge ? ` <span class="gq-arrow">→</span> ${gqEdgeChip(edge.type)} <span class="gq-arrow">→</span> ` : '');
    }).join('');
    el.innerHTML = `
      <div style="margin-bottom:8px;font-weight:600;">最短路径 — 长度 ${d.length}</div>
      <div class="gq-path-step">${pathHtml}</div>`;
    // 在知识图谱中渲染路径子图
    const subEdges = (d.edges || []).map(e => ({source: e.from, target: e.to, type: e.type}));
    renderSubgraph(d.path, subEdges);
  } catch (err) { console.error(err); gqError('查询失败: ' + (err && err.message ? err.message : err)); }
}

// ── 2. 共同邻居 ──
async function runCommonNeighbors() {
  const a = getSSValue('gq-common-a');
  const b = getSSValue('gq-common-b');
  if (!a || !b) { alert('请选择两个节点'); return; }
  gqLoading();
  try {
    const r = await fetch(API + `/api/graph/${encodeURIComponent(a)}/common?other=${encodeURIComponent(b)}`);
    const d = await r.json();
    const el = document.getElementById('gq-result');
    const common = d.common || [];
    if (!common.length) {
      el.innerHTML = `<div style="margin-bottom:8px;">${gqNodeChip(d.node_a)} 与 ${gqNodeChip(d.node_b)} 无共同邻居</div>`;
      resetGraph();
      return;
    }
    el.innerHTML = `
      <div style="margin-bottom:8px;font-weight:600;">共同邻居 — ${d.count} 个</div>
      <div style="margin-bottom:8px;">${gqNodeChip(d.node_a)} ↔ ${gqNodeChip(d.node_b)}</div>
      ${common.map(c => `<div class="gq-card">
        ${gqClickableNode(c.node)}
        <div class="gq-card-meta">A 边: ${gqEdgeChip(c.a_edge || 'N/A')} · B 边: ${gqEdgeChip(c.b_edge || 'N/A')}</div>
      </div>`).join('')}`;
    // 在知识图谱中渲染共同邻居子图
    const cnNodeIds = [d.node_a, d.node_b, ...common.map(c => c.node)];
    const cnEdges = [];
    common.forEach(c => {
      if (c.a_edge) cnEdges.push({source: d.node_a, target: c.node, type: c.a_edge});
      if (c.b_edge) cnEdges.push({source: d.node_b, target: c.node, type: c.b_edge});
    });
    renderSubgraph(cnNodeIds, cnEdges);
  } catch (err) { console.error(err); gqError('查询失败: ' + (err && err.message ? err.message : err)); }
}

        ${lv.nodes.map(n => `<div class="gq-card">
          ${gqClickableNode(n.id)} <span class="gq-card-meta">via ${esc(nodeLabel(n.via))} · ${gqEdgeChip(n.edge)}</span>

    el.innerHTML = `
      <div style="margin-bottom:8px;font-weight:600;">共现分析 — ${d.count} 个相关实体</div>
      <div style="margin-bottom:8px;">实体: ${gqNodeChip(d.entity || entityId)}</div>
      ${coocs.map(c => `<div class="gq-card">
        ${gqClickableNode(c.entity)}
        <div class="gq-card-meta">共现次数: ${c.co_occurrence_count}</div>
      </div>`).join('')}`;
    // 在知识图谱中渲染共现子图（中心实体 ↔ 共现实体）
    const coEntity = d.entity || entityId;
    const coNodeIds = [coEntity, ...coocs.map(c => c.entity)];
    const coEdges = coocs.map(c => ({source: coEntity, target: c.entity, type: 'entity_related'}));
    renderSubgraph(coNodeIds, coEdges);
  } catch (err) { console.error(err); gqError('查询失败: ' + (err && err.message ? err.message : err)); }
}

// ── 8. 中心性排行 ──
async function runCentral() {
  const limit = document.getElementById('gq-central-limit').value;
  gqLoading();
  try {
    const r = await fetch(API + `/api/graph/central?limit=${limit}`);
    const d = await r.json();
    const el = document.getElementById('gq-result');
    const nodes = d.nodes || [];
    if (!nodes.length) {
      el.innerHTML = '<span style="color:var(--red-fg)">无数据</span>';
      resetGraph();
      return;
    }
    el.innerHTML = `
      <div style="margin-bottom:8px;font-weight:600;">度中心性 Top ${nodes.length}</div>
      ${nodes.map((n, i) => `<div class="gq-card">
        <span style="color:var(--text-tertiary);font-family:var(--font-mono);margin-right:8px;">#${i+1}</span>
        ${gqClickableNode(n.node)}
        <span class="gq-card-meta">度=${n.degree} (入${n.in_degree}/出${n.out_degree})</span>
      </div>`).join('')}`;
    // 在知识图谱中渲染 Top 节点（含全图中它们之间的连边）
    const cenNodeIds = nodes.map(n => n.node);
    const srcId = e => (e.source && typeof e.source === 'object') ? e.source.id : e.source;
    const dstId = e => (e.target && typeof e.target === 'object') ? e.target.id : e.target;
    const cenIdSet = new Set(cenNodeIds);
    const cenEdges = graphData.edges
      .filter(e => cenIdSet.has(srcId(e)) && cenIdSet.has(dstId(e)))
      .map(e => ({source: srcId(e), target: dstId(e), type: e.type}));
    renderSubgraph(cenNodeIds, cenEdges);
  } catch (err) { console.error(err); gqError('查询失败: ' + (err && err.message ? err.message : err)); }
}

      <div class="meta-desc">${esc(t.description || '')}</div>
    </div>`).join('');

async function loadTagsMeta() {
  const el = document.getElementById('tag-list');
  try {
    const r = await fetch(API + '/api/tags');
    const d = await r.json();
    const tags = d.tags || [];
    if (!tags.length) { el.innerHTML = '<div style="color:var(--text-tertiary);font-size:12px;">暂无</div>'; return; }
    // Build tree by parent
    const byParent = {};
    const roots = [];
    tags.forEach(t => {
      if (t.parent) {
        if (!byParent[t.parent]) byParent[t.parent] = [];
        byParent[t.parent].push(t);
      } else {
        roots.push(t);
      }
    });
    const renderTag = (t, depth) => {
      const indent = depth > 0 ? 'meta-indent' : '';
      const children = (byParent[t.id] || []).map(c => renderTag(c, depth + 1)).join('');
      return `<div class="meta-item ${indent}" onclick="searchMeta('${esc(t.name)}')">
        <div class="meta-name">${esc(t.name)}</div>
      </div>${children}`;
    };
    el.innerHTML = roots.map(t => renderTag(t, 0)).join('');
  } catch (e) { el.innerHTML = '<div style="color:var(--red-fg)">加载失败</div>'; }
}

// ── Helpers ──
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function renderMarkdown(md) {
  // very simple markdown: ## headings, paragraphs
  return esc(md).replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}

// ── Ontology module（本体可视化：概念图 + 概念详情）──
// 自包含模块，独立于知识图谱视图，复用 D3 力导向 / zoom-pan 交互模式。
const ONTO_TYPE_COLORS = {
  mechanism: '#1F6C9F', component: '#6B3FA0', process: '#346538',
  problem: '#9F2F2D', configuration: '#956400', concept: '#787774',
  algorithm: '#0E7C7B', pattern: '#B5540A', metric: '#4A5D23',
  infrastructure: '#5B4B8A', tool: '#8C6A5B',
};
const ONTO_EDGE_COLORS = {
  is_a: '#A8A6A1', depends: '#1F6C9F', triggers: '#9F2F2D',
  contains: '#346538', contrasts: '#B5540A', related: '#787774',
  implements: '#6B3FA0', supersedes: '#956400',
};
let ontoData = { nodes: [], edges: [] };
let ontoConcepts = [];
let ontoSim = null, ontoZoom = null, ontoG = null;
let ontoSelected = null;

async function loadOntology() {
  const statsEl = document.getElementById('onto-stats');
  statsEl.innerHTML = '<span class="onto-chip">加载中…</span>';
  try {
    const [statsRes, graphRes, listRes] = await Promise.all([
      fetch(API + '/api/ontology/stats'),
      fetch(API + '/api/ontology/graph'),
      fetch(API + '/api/ontology/concepts'),
    ]);
    const stats = await statsRes.json();
    const graph = await graphRes.json();
    const list = await listRes.json();
    ontoData = { nodes: graph.nodes || [], edges: graph.edges || [] };
    ontoConcepts = list.concepts || [];
    // 度数
    const deg = {};
    ontoData.edges.forEach(e => { deg[e.source] = (deg[e.source]||0)+1; deg[e.target] = (deg[e.target]||0)+1; });
    ontoData.nodes.forEach(n => { n.degree = deg[n.id] || 0; });
    // 统计 chip
    const typeCounts = {};
    ontoConcepts.forEach(c => { typeCounts[c.type] = (typeCounts[c.type]||0)+1; });
    statsEl.innerHTML =
      `<span class="onto-chip">概念 <b>${stats.concepts}</b></span>` +
      `<span class="onto-chip">关系 <b>${stats.relations}</b></span>` +
      `<span class="onto-chip">绑定 <b>${stats.bindings}</b></span>` +
      `<span class="onto-chip">类型 <b>${Object.keys(typeCounts).length}</b></span>`;
    // 填充 filter
    populateOntoFilters(typeCounts);
    renderOntoList();
    renderOntoLegend();
    buildOntoGraph();
  } catch (e) {
    statsEl.innerHTML = '<span class="onto-chip">加载失败</span>';
    document.getElementById('onto-concept-list').innerHTML = '<div class="empty">' + esc(e.message) + '</div>';
  }
}

function populateOntoFilters(typeCounts) {
  const typeSel = document.getElementById('onto-type-filter');
  const curType = typeSel.value;
  typeSel.innerHTML = '<option value="">全部类型</option>' +
    Object.keys(typeCounts).sort().map(t => `<option value="${esc(t)}">${esc(t)} (${typeCounts[t]})</option>`).join('');
  typeSel.value = curType;
  const edgeSel = document.getElementById('onto-edge-filter');
  const curEdge = edgeSel.value;
  const edgeTypes = [...new Set(ontoData.edges.map(e => e.type))].sort();
  edgeSel.innerHTML = '<option value="">全部关系</option>' +
    edgeTypes.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
  edgeSel.value = curEdge;
  if (!typeSel.onchange) typeSel.onchange = buildOntoGraph;
  if (!edgeSel.onchange) edgeSel.onchange = buildOntoGraph;
}

function renderOntoList() {
  const q = (document.getElementById('onto-search').value || '').toLowerCase();
  const typeFilter = document.getElementById('onto-type-filter').value;
  let items = ontoConcepts.filter(c =>
    (!typeFilter || c.type === typeFilter) &&
    (!q || c.name.toLowerCase().includes(q) || (c.id||'').toLowerCase().includes(q)));
  items.sort((a, b) => a.name.localeCompare(b.name));
  // 按类型分组
  const groups = {};
  items.forEach(c => { (groups[c.type] = groups[c.type] || []).push(c); });
  const typeOrder = Object.keys(groups).sort();
  const html = typeOrder.map(type => {
    const head = `<div class="onto-group-head">${esc(type)} · ${groups[type].length}</div>`;
    const rows = groups[type].map(c => {
      const color = ONTO_TYPE_COLORS[c.type] || '#787774';
      const active = ontoSelected === c.id ? ' active' : '';
      return `<div class="onto-item${active}" onclick="selectOntoConcept('${esc(c.id)}')">` +
        `<div class="onto-dot" style="background:${color}"></div>` +
        `<span class="nm">${esc(c.name)}</span>` +
        `<span class="ct">${c.children_count||0}/${c.binding_count||0}</span></div>`;
    }).join('');
    return head + rows;
  }).join('');
  document.getElementById('onto-concept-list').innerHTML = html || '<div class="empty">无匹配概念</div>';
}

function renderOntoLegend() {
  const types = [...new Set(ontoData.nodes.map(n => n.type))].sort();
  const edgeTypes = [...new Set(ontoData.edges.map(e => e.type))].sort();
  const typeItems = types.map(t =>
    `<div class="legend-item"><div class="legend-dot" style="background:${ONTO_TYPE_COLORS[t]||'#787774'}"></div>${esc(t)}</div>`).join('');
  const edgeItems = edgeTypes.map(t =>
    `<div class="legend-item"><div class="legend-line" style="background:${ONTO_EDGE_COLORS[t]||'#E2E0DC'}"></div>${esc(t)}</div>`).join('');
  document.getElementById('onto-legend').innerHTML = typeItems + edgeItems;
}

function getOntoFiltered() {
  const typeFilter = document.getElementById('onto-type-filter').value;
  const edgeFilter = document.getElementById('onto-edge-filter').value;
  const visNodes = ontoData.nodes.filter(n => !typeFilter || n.type === typeFilter);
  const visIds = new Set(visNodes.map(n => n.id));
  const visEdges = ontoData.edges
    .filter(e => visIds.has(e.source) && visIds.has(e.target) && (!edgeFilter || e.type === edgeFilter))
    .map(e => ({ source: e.source, target: e.target, type: e.type }));
  return { nodes: visNodes.map(n => ({...n})), edges: visEdges };
}

function buildOntoGraph() {
  if (!ontoData.nodes.length) return;
  const { nodes, edges } = getOntoFiltered();
  const svgEl = document.getElementById('onto-svg');
  const W = svgEl.clientWidth || 800, H = 560;
  d3.select('#onto-svg').selectAll('*').remove();
  if (ontoSim) { ontoSim.stop(); ontoSim = null; }
  if (!nodes.length) {
    d3.select('#onto-svg').append('text').attr('x', '50%').attr('y', '50%')
      .attr('text-anchor','middle').attr('fill','#A8A6A1').text('无匹配节点');
    return;
  }
  const svg = d3.select('#onto-svg').attr('viewBox', `0 0 ${W} ${H}`);
  ontoG = svg.append('g');
  ontoZoom = d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => ontoG.attr('transform', e.transform));
  svg.call(ontoZoom);
  // 箭头 marker
  const defs = svg.append('defs');
  [...new Set(edges.map(e => e.type))].forEach(et => {
    defs.append('marker').attr('id', `o-arrow-${et}`).attr('viewBox', '0 -5 10 10')
      .attr('refX', 14).attr('refY', 0).attr('markerWidth', 6).attr('markerHeight', 6)
      .attr('orient', 'auto').append('path').attr('d', 'M0,-5L10,0L0,5')
      .attr('fill', ONTO_EDGE_COLORS[et] || '#E2E0DC');
  });
  // is_a 用虚线，其余实线
  const link = ontoG.append('g').attr('class', 'links').selectAll('line')
    .data(edges).enter().append('line').attr('class', 'graph-link')
    .attr('stroke', d => ONTO_EDGE_COLORS[d.type] || '#E2E0DC')
    .attr('stroke-width', d => d.type === 'is_a' ? 1 : 1.5)
    .attr('stroke-opacity', d => d.type === 'is_a' ? 0.3 : 0.5)
    .attr('stroke-dasharray', d => d.type === 'is_a' ? '4 3' : null)
    .attr('marker-end', d => `url(#o-arrow-${d.type})`);
  const node = ontoG.append('g').attr('class', 'nodes').selectAll('g')
    .data(nodes).enter().append('g').attr('class', 'graph-node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active && ontoSim) ontoSim.alpha(1).alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active && ontoSim) ontoSim.alphaTarget(0); }));
  node.append('circle')
    .attr('r', d => Math.max(5, Math.min(13, 5 + d.degree * 0.9)))
    .attr('fill', d => ONTO_TYPE_COLORS[d.type] || '#787774')
    .attr('stroke', d => d.id === ontoSelected ? '#111' : '#fff')
    .attr('stroke-width', d => d.id === ontoSelected ? 2.5 : 1.5)
    .attr('fill-opacity', 0.85);
  node.append('text').attr('class', 'graph-label')
    .attr('dy', d => -(Math.max(5, Math.min(13, 5 + d.degree * 0.9)) + 4))
    .attr('text-anchor', 'middle')
    .text(d => d.label.length > 18 ? d.label.slice(0, 18) + '…' : d.label);
  // Tooltip（复用 graph-tooltip）
  const tooltip = document.getElementById('graph-tooltip');
  node.on('mouseenter', (e, d) => {
    if (tooltip) {
      tooltip.innerHTML = `<div class="tt-label">${esc(d.label)}</div>` +
        `<div class="tt-meta">类型: ${esc(d.type)} · 度: ${d.degree}</div>`;
      tooltip.classList.add('show');
    }
  }).on('mousemove', e => { if (tooltip) { tooltip.style.left = (e.pageX+12)+'px'; tooltip.style.top = (e.pageY-10)+'px'; } })
    .on('mouseleave', () => { if (tooltip) tooltip.classList.remove('show'); });
  // Hover 高亮邻居
  node.on('mouseover', (e, d) => {
    const nb = new Set([d.id]);
    edges.forEach(le => {
      if (le.source === d.id) nb.add(le.target);
      if (le.target === d.id) nb.add(le.source);
    });
    node.classed('dimmed', n => !nb.has(n.id));
    link.classed('dimmed', le => !(nb.has(le.source) && nb.has(le.target)));
    link.classed('highlight', le => le.source === d.id || le.target === d.id);
  }).on('mouseout', () => {
    node.classed('dimmed', false);
    link.classed('dimmed', false).classed('highlight', false);
  });
  node.on('click', (e, d) => selectOntoConcept(d.id));
  // 力导向
  const spread = Math.min(W*0.7, 380);
  nodes.forEach(n => { n.x = W/2 + (Math.random()-0.5)*spread; n.y = H/2 + (Math.random()-0.5)*Math.min(H*0.7,300); n.vx=0; n.vy=0; });
  const linkDist = Math.max(50, Math.min(110, nodes.length * 2.2));
  ontoSim = d3.forceSimulation(nodes).alpha(1).alphaDecay(0.02)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(linkDist).strength(0.35))
    .force('charge', d3.forceManyBody().strength(-180).distanceMax(220))
    .force('center', d3.forceCenter(W/2, H/2).strength(0.06))
    .force('collide', d3.forceCollide().radius(d => Math.max(7, 5 + d.degree*0.9) + 4).strength(0.6));
  ontoSim.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

async function selectOntoConcept(id) {
  ontoSelected = id;
  renderOntoList();
  // 高亮图中节点
  d3.select('#onto-svg').selectAll('.graph-node circle')
    .attr('stroke', d => d.id === id ? '#111' : '#fff')
    .attr('stroke-width', d => d.id === id ? 2.5 : 1.5);
  const detail = document.getElementById('onto-detail');
  detail.innerHTML = '<div class="empty">加载中…</div>';
  try {
    const r = await fetch(API + '/api/ontology/concepts/' + encodeURIComponent(id) + '/expand?depth=2');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const c = d.concept || {};
    const color = ONTO_TYPE_COLORS[c.type] || '#787774';
    let html = `<h4>${esc(c.name)}</h4>` +
      `<span class="onto-type-badge" style="background:${color}22;color:${color}">${esc(c.type)}</span>`;
    if (c.description) html += `<div class="onto-desc">${esc(c.description)}</div>`;
    // 祖先链
    if (d.ancestors && d.ancestors.length) {
      html += '<h5>祖先链</h5>' + d.ancestors.map(a =>
        `<div class="onto-rel" onclick="selectOntoConcept('${esc(a.id)}')"><span class="rt">is_a</span><span>${esc(a.name)}</span></div>`).join('');
    }
    // 子概念
    if (d.children && d.children.length) {
      html += '<h5>子概念</h5>' + d.children.map(ch =>
        `<div class="onto-rel" onclick="selectOntoConcept('${esc(ch.id)}')"><span class="rt">child</span><span>${esc(ch.name)}</span></div>`).join('');
    }
    // 关系
    if (d.relations && d.relations.length) {
      html += '<h5>关系</h5>' + d.relations.map(r => {
        const name = r.target_name || r.source_name || '';
        const rid = r.direction === 'out' ? r.target : r.source;
        return `<div class="onto-rel" onclick="selectOntoConcept('${esc(rid)}')"><span class="rt">${esc(r.type)}</span><span>${esc(name)}</span><span class="ct">${r.direction}</span></div>`;
      }).join('');
    }
    // 绑定文档
    if (d.bindings && d.bindings.length) {
      html += '<h5>绑定文档</h5>' + d.bindings.map(b =>
        `<div class="onto-bind"><span class="bt">[${esc(b.binding_type)}]</span> ${esc(b.title || b.doc_id)}</div>`).join('');
    }
    if (d.related_concepts && d.related_concepts.length) {
      html += '<h5>相关概念（N跳）</h5>' + d.related_concepts.slice(0, 12).map(rc =>
        `<div class="onto-rel" onclick="selectOntoConcept('${esc(rc.id)}')"><span>${esc(rc.name)}</span><span class="ct">${esc(rc.type)}</span></div>`).join('');
    }
    detail.innerHTML = html || '<div class="empty">无更多信息</div>';
  } catch (e) {
    detail.innerHTML = '<div class="empty">加载失败: ' + esc(e.message) + '</div>';
  }
}

async function ontoExport() {
  try {
    const r = await fetch(API + '/api/ontology/export');
    const yaml = await r.text();
    const blob = new Blob([yaml], { type: 'text/yaml' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'concepts.yaml';
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (e) { alert('导出失败: ' + e.message); }
}

async function ontoImport() {
  if (!confirm('从 ontology/concepts.yaml 重新导入本体？\n（会保留已有概念，幂等 UPSERT）')) return;
  try {
    const r = await fetch(API + '/api/ontology/import', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({}) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || r.status);
    alert(`导入完成：新增 ${d.imported||0}，更新 ${d.updated||0}，错误 ${d.errors?.length||0}`);
    loadOntology();
  } catch (e) { alert('导入失败: ' + e.message); }
}

async function ontoBuild() {
  const hint = prompt('LLM 辅助本体构建\n输入领域提示（可留空）：', '');
  if (hint === null) return;
  try {
    const r = await fetch(API + '/api/ontology/build', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ domain_hint: hint }) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || r.status);
    alert(`构建完成：提议 ${d.concepts?.length||0} 概念，${d.relations?.length||0} 关系\nYAML: ${d.output_yaml || '(未生成)'}`);
    loadOntology();
  } catch (e) { alert('构建失败: ' + e.message); }
}

// ── Init ──
checkHealth();
loadDocs();
renderSampleQs();
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
